<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Control</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f7f6f2;
  --surface:#ffffff;
  --surface2:#f0efe9;
  --border:#e4e2da;
  --text:#1a1916;
  --sub:#888580;
  --dim:#b5b2ab;
  --fan:#1d4ed8;
  --fan-light:#dbeafe;
  --fan-border:#93c5fd;
  --light:#b45309;
  --light-bg:#fef3c7;
  --light-border:#fcd34d;
  --on-fan:#1d4ed8;
  --on-light:#d97706;
  --off:#6b7280;
  --red:#dc2626;
}

body{
  background:var(--bg);
  font-family:'DM Sans',sans-serif;
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

.page{
  max-width:480px;
  width:100%;
  margin:0 auto;
  padding:2rem 1.25rem 0;
  flex:1;
  display:flex;
  flex-direction:column;
}

header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:2.5rem;
}

.header-left h1{
  font-size:1.35rem;
  font-weight:600;
  letter-spacing:-0.01em;
  color:var(--text);
}

.header-left p{
  font-size:13px;
  color:var(--sub);
  margin-top:2px;
}

/* Connection dot — status indicator only now */
.conn-dot{
  width:36px;height:36px;
  border-radius:50%;
  background:var(--surface);
  border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  position:relative;
}

.conn-dot .dot{
  width:10px;height:10px;
  border-radius:50%;
  background:#22c55e;
  transition:background 0.3s;
}

.conn-dot.listening .dot{
  background:var(--red);
  animation:dpulse 0.8s ease-in-out infinite;
}

.conn-dot.offline .dot{ background:var(--dim); }

@keyframes dpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.3)}}

/* IP config row */
.config-row{
  display:flex;
  gap:8px;
  align-items:center;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 14px;
  margin-bottom:2rem;
}

.config-row label{
  font-size:12px;
  color:var(--sub);
  white-space:nowrap;
  font-family:'DM Mono',monospace;
}

.config-row input{
  flex:1;
  border:none;outline:none;
  background:transparent;
  font-family:'DM Mono',monospace;
  font-size:13px;
  color:var(--text);
  min-width:0;
}

/* Room cards */
.rooms{display:flex;flex-direction:column;gap:1rem;}

.room-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:1.25rem 1.5rem;
  transition:box-shadow 0.2s;
}

.room-header{
  display:flex;align-items:center;
  justify-content:space-between;
  margin-bottom:1.25rem;
}

.room-title{
  display:flex;align-items:center;gap:10px;
}

.room-icon{
  width:40px;height:40px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
}

.room-icon.fan-icon{ background:var(--fan-light); border:1px solid var(--fan-border); }
.room-icon.light-icon{ background:var(--light-bg); border:1px solid var(--light-border); }

.room-icon svg{ width:20px;height:20px; }
.fan-icon svg{ stroke:var(--fan); }
.light-icon svg{ stroke:var(--light); }

.room-name{
  font-size:15px;font-weight:600;
  color:var(--text);
}

.room-sub{
  font-size:12px;color:var(--sub);margin-top:1px;
}

/* State pill */
.state-pill{
  font-size:11px;font-weight:500;
  padding:4px 10px;border-radius:20px;
  background:var(--surface2);
  color:var(--sub);
  border:1px solid var(--border);
  font-family:'DM Mono',monospace;
  letter-spacing:0.04em;
  transition:all 0.2s;
}

.state-pill.on-fan{ background:var(--fan-light); color:var(--on-fan); border-color:var(--fan-border); }
.state-pill.on-light{ background:var(--light-bg); color:var(--on-light); border-color:var(--light-border); }

/* Toggle buttons */
.btn-row{display:flex;gap:8px;}

.ctrl-btn{
  flex:1;
  padding:11px 0;
  border-radius:10px;
  font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:500;
  border:1.5px solid var(--border);
  background:var(--surface2);
  color:var(--sub);
  cursor:pointer;
  transition:all 0.15s;
}

.ctrl-btn:hover{ background:var(--border); color:var(--text); }
.ctrl-btn:active{ transform:scale(0.97); }

.ctrl-btn.active-on-fan{
  background:var(--fan-light);
  border-color:var(--fan-border);
  color:var(--on-fan);
  font-weight:600;
}

.ctrl-btn.active-on-light{
  background:var(--light-bg);
  border-color:var(--light-border);
  color:var(--on-light);
  font-weight:600;
}

.ctrl-btn.active-off{
  background:#fee2e2;
  border-color:#fca5a5;
  color:var(--red);
}

/* Last action line */
.last-action{
  margin-top:1.25rem;
  text-align:center;
  font-size:12px;
  color:var(--dim);
  font-family:'DM Mono',monospace;
  min-height:18px;
}

/* ── HIDDEN VOICE ZONE ──────────────────────────────────────
   Looks like plain empty space below the cards.
   No border, no obvious button. Cursor is the only hint.
   Hold for 1 second to activate mic; release to stop.
   When listening: very faint ripple expands from center.
──────────────────────────────────────────────────────────── */
.voice-zone{
  flex:1;
  min-height:120px;
  margin:0 -1.25rem;        /* bleed to page edges */
  position:relative;
  cursor:pointer;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  background:var(--bg);     /* same as page — invisible */
}

/* Faint hint text — very low opacity, easy to miss */
.voice-hint{
  font-size:12px;
  color:var(--dim);
  font-family:'DM Mono',monospace;
  letter-spacing:0.08em;
  opacity:0.45;
  pointer-events:none;
  transition:opacity 0.3s;
  position:relative;
  z-index:1;
}

.voice-zone.holding .voice-hint,
.voice-zone.active  .voice-hint{
  opacity:0;
}

/* Ripple ring — invisible until hold starts */
.voice-ripple{
  position:absolute;
  width:60px;height:60px;
  border-radius:50%;
  border:1.5px solid var(--dim);
  opacity:0;
  pointer-events:none;
  transform:scale(0.6);
  transition:none;
}

/* Loading ring while waiting for 1s threshold */
@keyframes ring-grow{
  0%  { opacity:0.25; transform:scale(0.6); }
  100%{ opacity:0;    transform:scale(2.6); }
}

/* Active listening ripple — slower, more prominent */
@keyframes ring-pulse{
  0%  { opacity:0.35; transform:scale(0.7); }
  100%{ opacity:0;    transform:scale(3.2); }
}

.voice-zone.holding .voice-ripple{
  animation: ring-grow 0.9s ease-out infinite;
}

.voice-zone.active .voice-ripple{
  border-color:var(--red);
  animation: ring-pulse 1.1s ease-out infinite;
}

/* Tiny feedback toast */
.toast{
  position:fixed;
  bottom:24px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:#1a1916;
  color:#fff;
  font-size:13px;
  padding:10px 20px;
  border-radius:24px;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events:none;
  white-space:nowrap;
  z-index:99;
}

.toast.show{ transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="page">

  <header>
    <div class="header-left">
      <h1>Home Control</h1>
      <p id="subtext">Living Room</p>
    </div>
    <!-- Connection status dot — purely visual now -->
    <div class="conn-dot" id="connDot">
      <div class="dot"></div>
    </div>
  </header>

  <div class="config-row">
    <label>IP</label>
    <input id="espIp" type="text" value="192.168.1.100" spellcheck="false" autocomplete="off"/>
  </div>

  <div class="rooms">

    <!-- FAN CARD -->
    <div class="room-card">
      <div class="room-header">
        <div class="room-title">
          <div class="room-icon fan-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
              <path d="M12 12c1.5-3 5-4 7-2s1 6-2 7-6-1-5-5z"/>
              <path d="M12 12c3 1.5 4 5 2 7s-6 1-7-2 1-6 5-5z"/>
              <path d="M12 12c-1.5 3-5 4-7 2s-1-6 2-7 6 1 5 5z"/>
              <path d="M12 12c-3-1.5-4-5-2-7s6-1 7 2-1 6-5 5z"/>
              <circle cx="12" cy="12" r="2"/>
            </svg>
          </div>
          <div>
            <div class="room-name">Ceiling Fan</div>
            <div class="room-sub">Bedroom · GPIO 26</div>
          </div>
        </div>
        <div class="state-pill" id="fan-pill">OFF</div>
      </div>
      <div class="btn-row">
        <button class="ctrl-btn" id="fan-on-btn" onclick="sendCmd('fan','on')">Turn On</button>
        <button class="ctrl-btn active-off" id="fan-off-btn" onclick="sendCmd('fan','off')">Turn Off</button>
      </div>
    </div>

    <!-- LIGHT CARD -->
    <div class="room-card">
      <div class="room-header">
        <div class="room-title">
          <div class="room-icon light-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
              <path d="M9 18h6M10 22h4"/>
              <path d="M12 2a7 7 0 0 1 7 7 7 7 0 0 1-3.5 6.06V17a1 1 0 0 1-1 1h-5a1 1 0 0 1-1-1v-1.94A7 7 0 0 1 5 9a7 7 0 0 1 7-7z"/>
            </svg>
          </div>
          <div>
            <div class="room-name">Room Light</div>
            <div class="room-sub">Bedroom · GPIO 27</div>
          </div>
        </div>
        <div class="state-pill" id="light-pill">OFF</div>
      </div>
      <div class="btn-row">
        <button class="ctrl-btn" id="light-on-btn" onclick="sendCmd('light','on')">Turn On</button>
        <button class="ctrl-btn active-off" id="light-off-btn" onclick="sendCmd('light','off')">Turn Off</button>
      </div>
    </div>

  </div>

  <div class="last-action" id="lastAction">—</div>

  <!-- ── HIDDEN VOICE ZONE ──────────────────────────────────
       Looks like empty space below cards. Hold 1s to talk.
  ──────────────────────────────────────────────────────── -->
  <div class="voice-zone" id="voiceZone">
    <div class="voice-ripple" id="voiceRipple"></div>
    <span class="voice-hint">hold to speak</span>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const ESP_IP = () => document.getElementById('espIp').value.trim();

// ── Device state ──────────────────────────────────────────
const state = { fan: false, light: false };

function updateUI(device, on) {
  state[device] = on;
  const pill   = document.getElementById(`${device}-pill`);
  const onBtn  = document.getElementById(`${device}-on-btn`);
  const offBtn = document.getElementById(`${device}-off-btn`);
  const suffix = device === 'fan' ? '-fan' : '-light';
  pill.textContent = on ? 'ON' : 'OFF';
  pill.className   = 'state-pill' + (on ? ` on${suffix}` : '');
  onBtn.className  = 'ctrl-btn'   + (on  ? ` active-on${suffix}` : '');
  offBtn.className = 'ctrl-btn'   + (!on ? ' active-off' : '');
}

// ── HTTP ──────────────────────────────────────────────────
async function sendCmd(device, action) {
  const url = `http://${ESP_IP()}/${device}/${action}`;
  const on  = action === 'on';
  updateUI(device, on);
  setLastAction(`${device} → ${action.toUpperCase()}`);
  try {
    await fetch(url, { method:'GET', mode:'no-cors', signal: AbortSignal.timeout(5000) });
  } catch(e) {
    showToast('No response from device');
  }
}

// ── Helpers ───────────────────────────────────────────────
function setLastAction(msg) {
  document.getElementById('lastAction').textContent = msg;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── HIDDEN HOLD-TO-TALK VOICE ZONE ────────────────────────
// Press and hold the bottom area for ≥1s → mic activates.
// Release → mic stops immediately.
// The zone looks like plain empty space — no obvious button.
// Only feedback: faint expanding ring, then red ring + dot pulse.

const zone        = document.getElementById('voiceZone');
const connDot     = document.getElementById('connDot');
let holdTimer     = null;
let recognition   = null;
let voiceActive   = false;

function startHold() {
  if (voiceActive) return;
  zone.classList.add('holding');
  holdTimer = setTimeout(() => {
    zone.classList.remove('holding');
    activateMic();
  }, 1000);
}

function endHold() {
  clearTimeout(holdTimer);
  zone.classList.remove('holding');
  if (voiceActive) {
    stopMic();
  }
}

// Mouse events
zone.addEventListener('mousedown',  startHold);
zone.addEventListener('mouseup',    endHold);
zone.addEventListener('mouseleave', endHold);

// Touch events
zone.addEventListener('touchstart', (e) => { e.preventDefault(); startHold(); }, { passive:false });
zone.addEventListener('touchend',   endHold);
zone.addEventListener('touchcancel',endHold);

function activateMic() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    showToast('Use Chrome for voice');
    return;
  }

  const SR  = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang           = 'en-US';
  recognition.continuous     = true;    // keep listening while held
  recognition.interimResults = false;

  recognition.onstart = () => {
    voiceActive = true;
    zone.classList.add('active');
    connDot.classList.add('listening');
  };

  recognition.onresult = (e) => {
    const heard = e.results[e.results.length - 1][0].transcript.toLowerCase().trim();

    if      (heard.includes('fan') && heard.includes('on'))    sendCmd('fan',   'on');
    else if (heard.includes('fan') && heard.includes('off'))   sendCmd('fan',   'off');
    else if (heard.includes('light') && heard.includes('on'))  sendCmd('light', 'on');
    else if (heard.includes('light') && heard.includes('off')) sendCmd('light', 'off');
  };

  recognition.onerror = () => {};

  recognition.onend = () => {
    voiceActive = false;
    zone.classList.remove('active');
    connDot.classList.remove('listening');
  };

  recognition.start();
}

function stopMic() {
  if (recognition) {
    try { recognition.stop(); } catch(e) {}
  }
  voiceActive = false;
  zone.classList.remove('active','holding');
  connDot.classList.remove('listening');
}

// ── Poll ESP32 status every 10s ───────────────────────────
async function pollStatus() {
  try {
    const r = await fetch(`http://${ESP_IP()}/status`, { signal: AbortSignal.timeout(3000) });
    const j = await r.json();
    updateUI('fan',   j.fan);
    updateUI('light', j.light);
    connDot.classList.remove('offline');
  } catch(e) {
    connDot.classList.add('offline');
  }
}

pollStatus();
setInterval(pollStatus, 10000);
</script>
</body>
</html>
